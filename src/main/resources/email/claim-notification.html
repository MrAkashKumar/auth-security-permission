<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Claim Notification</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 20px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #2980b9; color: white; padding: 24px; text-align: center; }
    .content { padding: 24px; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    .label { color: #666; font-weight: bold; }
    .value { color: #333; }
    .btn { display: inline-block; background: #2980b9; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; margin-top: 16px; }
    .footer { background: #f4f4f4; padding: 16px; text-align: center; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>📋 New Expense Claim Submitted</h2>
    </div>
    <div class="content">
      <p>A new expense claim has been submitted and requires your review.</p>
      <div class="info-row"><span class="label">Claim Number:</span><span class="value" th:text="${claimNumber}"></span></div>
      <div class="info-row"><span class="label">Submitted By:</span><span class="value" th:text="${submittedBy}"></span></div>
      <div class="info-row"><span class="label">Total Amount:</span><span class="value" th:text="'RM ' + ${totalAmount}"></span></div>
      <div class="info-row"><span class="label">Claim Date:</span><span class="value" th:text="${claimDate}"></span></div>
      <br>
      <a href="#" class="btn">Review Claim</a>
    </div>
    <div class="footer">This is an automated message from the Enterprise System.</div>
  </div>
</body>
</html>
