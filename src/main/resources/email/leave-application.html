<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Leave Application</title></head>
<body style="font-family:Arial,sans-serif;">
  <div style="max-width:600px;margin:20px auto;padding:24px;background:#fff;border-radius:8px">
    <h2 style="color:#2980b9">🏖️ Leave Application</h2>
    <p><strong th:text="${employeeName}"></strong> has applied for leave.</p>
    <table style="width:100%;border-collapse:collapse;margin:16px 0">
      <tr style="background:#f4f4f4"><td style="padding:8px;font-weight:bold">Leave Type:</td><td th:text="${leaveType}"></td></tr>
      <tr><td style="padding:8px;font-weight:bold">From:</td><td th:text="${startDate}"></td></tr>
      <tr style="background:#f4f4f4"><td style="padding:8px;font-weight:bold">To:</td><td th:text="${endDate}"></td></tr>
      <tr><td style="padding:8px;font-weight:bold">Total Days:</td><td th:text="${totalDays}"></td></tr>
      <tr style="background:#f4f4f4"><td style="padding:8px;font-weight:bold">Reason:</td><td th:text="${reason}"></td></tr>
    </table>
    <p>Please review and take appropriate action.</p>
  </div>
</body>
</html>
