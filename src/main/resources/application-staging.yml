# application-staging.yml
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://staging-db:5432/enterprisedb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:enterprise_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 28800000
    refresh-expiration: 259200000
  cors:
    allowed-origins: ${CORS_ORIGINS:https://staging.enterprise.com}
  file:
    upload-dir: ${FILE_UPLOAD_DIR:/data/uploads/staging}

logging:
  level:
    com.enterprise: INFO
    org.springframework.security: WARN
