spring:
  datasource:
    url: jdbc:h2:mem:enterprisedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: dev@enterprise.com
    password: dev-password
  flyway:
    enabled: false

app:
  jwt:
    secret: 4a9b2k3k4k2q1k0dd20md3slo5o02A0ZP1ldsH0E9N7eT0R3i2s8e
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:4200
  security:
    password-min-length: 8
    max-login-attempts: 5
    lockout-duration-minutes: 30
  file:
    upload-dir: ./uploads/dev
    max-size: 10MB

logging:
  level:
    com.enterprise: DEBUG
    org.springframework.security: DEBUG
